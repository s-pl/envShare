services:
  - type: web
    name: envshare-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MASTER_ENCRYPTION_KEY
        sync: false
        # Required: 64-char hex string.
        # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: JWT_SECRET
        sync: false
        # Required: 64-char hex string.
        # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: DATABASE_URL
        fromDatabase:
          name: envshare-db
          property: connectionString

databases:
  - name: envshare-db
    plan: starter
    databaseName: envshare
    user: envshare
