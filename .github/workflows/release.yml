name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'

jobs:
  # ── One build job per platform ──────────────────────────────────────────────
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            artifact: envshare-linux-x64

          - os: windows-latest
            target: node20-win-x64
            artifact: envshare-windows-x64.exe

          - os: macos-latest
            target: node20-macos-x64
            artifact: envshare-macos-x64

          - os: macos-latest
            target: node20-macos-arm64
            artifact: envshare-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: |
          npm ci || (echo "::error::package-lock.json is out of sync. Run 'npm install' in cli/ and commit the lock file." && exit 1)

      - name: Extract version
        id: meta
        shell: bash
        working-directory: cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"    >> $GITHUB_OUTPUT

      - name: Run tests
        working-directory: cli
        run: npm test

      - name: Bundle (esbuild → ESM + CJS for pkg)
        working-directory: cli
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: node build.mjs ${{ steps.meta.outputs.version }}

      - name: Package binary (pkg)
        working-directory: cli
        shell: bash
        run: |
          npx @yao-pkg/pkg pkg-entry.cjs \
            --targets ${{ matrix.target }} \
            --output ${{ matrix.artifact }} \
            --compress GZip \
            --no-bytecode \
            --public

      - name: Verify packaged artifact exists
        working-directory: cli
        shell: bash
        run: |
          if [ ! -f "${{ matrix.artifact }}" ]; then
            echo "::error::Expected artifact not found: ${{ matrix.artifact }}"
            ls -la
            exit 1
          fi

      - name: Sign macOS binary
        if: runner.os == 'macOS'
        working-directory: cli
        run: codesign --force --sign - ${{ matrix.artifact }}

      - name: Mark as executable (Unix)
        if: runner.os != 'Windows'
        working-directory: cli
        run: chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Publish GitHub Release once all binaries are ready ──────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        working-directory: cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"    >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: envshare ${{ steps.meta.outputs.tag }}
          body: |
            ## envshare ${{ steps.meta.outputs.tag }}

            Standalone binaries — no Node.js required.

            | Platform | File |
            |----------|------|
            | Windows x64 | `envshare-windows-x64.exe` |
            | macOS Intel | `envshare-macos-x64` |
            | macOS Apple Silicon | `envshare-macos-arm64` |
            | Linux x64 | `envshare-linux-x64` |

            ### Quick install

            ```bash
            # macOS Apple Silicon
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/envshare-macos-arm64 -o ~/.local/bin/envshare
            chmod +x ~/.local/bin/envshare

            # macOS Intel
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/envshare-macos-x64 -o ~/.local/bin/envshare
            chmod +x ~/.local/bin/envshare

            # Linux
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/envshare-linux-x64 -o ~/.local/bin/envshare
            chmod +x ~/.local/bin/envshare
            ```

            Or use the self-installer (once installed):
            ```bash
            envshare update
            ```
          files: artifacts/*
