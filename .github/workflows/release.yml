name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'

jobs:
  # ── One build job per platform ──────────────────────────────────────────────
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            artifact: envshare-linux-x64

          - os: windows-latest
            target: node20-win-x64
            artifact: envshare-windows-x64.exe

          - os: macos-latest
            target: node20-macos-x64
            artifact: envshare-macos-x64

          - os: macos-latest
            target: node20-macos-arm64
            artifact: envshare-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: |
          npm ci || (echo "::error::package-lock.json is out of sync. Run 'npm install' in cli/ and commit the lock file." && exit 1)

      - name: Extract version
        id: meta
        shell: bash
        working-directory: cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"    >> $GITHUB_OUTPUT

      - name: Run tests
        working-directory: cli
        run: npm test

      - name: Bundle (esbuild → ESM + CJS for pkg)
        working-directory: cli
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: node build.mjs ${{ steps.meta.outputs.version }}

      - name: Package binary (pkg)
        working-directory: cli
        shell: bash
        run: |
          npx @yao-pkg/pkg pkg-entry.cjs \
            --targets ${{ matrix.target }} \
            --output ${{ matrix.artifact }} \
            --compress GZip \
            --no-bytecode \
            --public

      - name: Verify packaged artifact exists
        working-directory: cli
        shell: bash
        run: |
          if [ ! -f "${{ matrix.artifact }}" ]; then
            echo "::error::Expected artifact not found: ${{ matrix.artifact }}"
            ls -la
            exit 1
          fi

      - name: Sign macOS binary
        if: runner.os == 'macOS'
        working-directory: cli
        run: codesign --force --sign - ${{ matrix.artifact }}

      - name: Mark as executable (Unix)
        if: runner.os != 'Windows'
        working-directory: cli
        run: chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Publish GitHub Release once all binaries are ready ──────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        working-directory: cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"    >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: envshare ${{ steps.meta.outputs.tag }}
          body: |
            ## envshare ${{ steps.meta.outputs.tag }}

            Standalone binaries — no Node.js required.

            | Platform | File |
            |----------|------|
            | Windows x64 | `envshare-windows-x64.exe` |
            | macOS Intel | `envshare-macos-x64` |
            | macOS Apple Silicon | `envshare-macos-arm64` |
            | Linux x64 | `envshare-linux-x64` |

            ### Install

            **macOS / Linux (Homebrew)**
            ```bash
            brew install s-pl/envshare/envshare
            ```

            **Windows (Scoop)**
            ```powershell
            scoop bucket add envshare https://github.com/s-pl/scoop-envshare
            scoop install envshare
            ```

            **Linux (manual)**
            ```bash
            sudo curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/envshare-linux-x64 \
              -o /usr/local/bin/envshare && sudo chmod +x /usr/local/bin/envshare
            ```
          files: artifacts/*

      # ── Compute SHA256 hashes (needed for Homebrew) ─────────────────────────
      - name: Compute SHA256 hashes
        id: sha
        run: |
          echo "arm64=$(sha256sum artifacts/envshare-macos-arm64    | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x64=$(sha256sum   artifacts/envshare-macos-x64      | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "win=$(sha256sum   artifacts/envshare-windows-x64.exe | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux=$(sha256sum artifacts/envshare-linux-x64       | awk '{print $1}')" >> $GITHUB_OUTPUT

      # ── Update Homebrew tap ──────────────────────────────────────────────────
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_ARM64: ${{ steps.sha.outputs.arm64 }}
          SHA_X64: ${{ steps.sha.outputs.x64 }}
          SHA_LINUX: ${{ steps.sha.outputs.linux }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/s-pl/homebrew-envshare.git tap
          mkdir -p tap/Formula
          cat > tap/Formula/envshare.rb <<FORMULA
          class Envshare < Formula
            desc "CLI for envShare — self-hosted secrets management for development teams"
            homepage "https://github.com/s-pl/envShare"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/s-pl/envShare/releases/download/v${VERSION}/envshare-macos-arm64"
                sha256 "${SHA_ARM64}"
              end
              on_intel do
                url "https://github.com/s-pl/envShare/releases/download/v${VERSION}/envshare-macos-x64"
                sha256 "${SHA_X64}"
              end
            end

            on_linux do
              url "https://github.com/s-pl/envShare/releases/download/v${VERSION}/envshare-linux-x64"
              sha256 "${SHA_LINUX}"
            end

            def install
              if OS.mac?
                bin.install (Hardware::CPU.arm? ? "envshare-macos-arm64" : "envshare-macos-x64") => "envshare"
              else
                bin.install "envshare-linux-x64" => "envshare"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/envshare version 2>&1")
            end
          end
          FORMULA
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add Formula/envshare.rb
          git diff --cached --quiet || git commit -m "envshare ${VERSION}"
          git push

      # ── Update Scoop bucket ──────────────────────────────────────────────────
      - name: Update Scoop bucket
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_WIN: ${{ steps.sha.outputs.win }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/s-pl/scoop-envshare.git scoop
          mkdir -p scoop/bucket
          cat > scoop/bucket/envshare.json <<JSON
          {
            "version": "${VERSION}",
            "description": "CLI for envShare — self-hosted secrets management for development teams",
            "homepage": "https://github.com/s-pl/envShare",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/s-pl/envShare/releases/download/v${VERSION}/envshare-windows-x64.exe",
                "hash": "${SHA_WIN}"
              }
            },
            "bin": [["envshare-windows-x64.exe", "envshare"]]
          }
          JSON
          cd scoop
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add bucket/envshare.json
          git diff --cached --quiet || git commit -m "envshare ${VERSION}"
          git push
