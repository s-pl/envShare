name: Inject Secrets Example

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy with envShare Secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install esai CLI
        run: npm install -g envsharesai

      - name: Pull secrets from envShare
        run: |
          esai pull --format dotenv --output .env
        env:
          ESAI_API_URL: ${{ secrets.ESAI_API_URL }}
          # The CLI authenticates with a service token (long-lived)
          ESAI_SERVICE_TOKEN: ${{ secrets.ESAI_SERVICE_TOKEN }}

      - name: Deploy application
        run: |
          source .env
          # Your deploy command here
          echo "Deploying with injected secrets..."
        # The .env file is only available within this job's filesystem
