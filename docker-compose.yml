services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: envsharesai
      POSTGRES_USER: envsharesai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envsharesai"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - internal

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://envsharesai:${POSTGRES_PASSWORD}@postgres:5432/envsharesai
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:?MASTER_ENCRYPTION_KEY is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      PORT: 3000
    ports:
      - "3001:3000"
    networks:
      - internal
      - external

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:3000}
    ports:
      - "5173:80"
    networks:
      - external

volumes:
  postgres_data:
    driver: local

networks:
  internal:
    internal: true
  external:
