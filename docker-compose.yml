services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: envsharesai
      POSTGRES_USER: envsharesai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envsharesai"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ── Security: PostgreSQL is only accessible within the internal network.
    # Do NOT expose port 5432 to the host in production — remove or comment
    # the ports section below when deploying. It is provided here for local
    # development convenience only.
    # ports:
    #   - "5432:5432"
    networks:
      - internal

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://envsharesai:${POSTGRES_PASSWORD}@postgres:5432/envsharesai
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:?MASTER_ENCRYPTION_KEY is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      PORT: 3000
      # ── GDPR Art. 5(1)(e) — Storage limitation ──────────────────────────────
      # Number of days to retain audit log entries (including IP addresses).
      # After this window, entries are automatically purged by the daily
      # retention job. Default: 365 days. Minimum recommended: 90 days.
      # Set AUDIT_LOG_RETENTION_DAYS=0 to disable automatic purging (not recommended).
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-365}
      # ── ISO 27001 A.12.4 ────────────────────────────────────────────────────
      # Set to "false" to disable automatic cleanup of expired refresh tokens.
      # Expired tokens are harmless but take up space and contain personal data
      # (IP address, User-Agent). Default: enabled.
      TOKEN_CLEANUP: ${TOKEN_CLEANUP:-true}
      # ── Optional ────────────────────────────────────────────────────────────
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3001:3000"
    networks:
      - internal
      - external


volumes:
  postgres_data:
    driver: local

networks:
  # internal: only backend + postgres can communicate here
  internal:
    internal: true
  # external: backend API and frontend are reachable from outside
  external:
