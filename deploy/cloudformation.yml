AWSTemplateFormatVersion: '2010-09-09'
Description: >
  envShare — Self-hosted secrets management platform.
  Deploys a single EC2 instance running Docker Compose (backend + PostgreSQL).
  Everything runs on the instance; no external databases are provisioned.

# ─── Parameters ───────────────────────────────────────────────────────────────
Parameters:

  MasterEncryptionKey:
    Type: String
    NoEcho: true
    Description: >
      64-character hex string. Generate with:
      node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
    MinLength: 64
    MaxLength: 64
    AllowedPattern: '[0-9a-fA-F]{64}'
    ConstraintDescription: Must be exactly 64 hexadecimal characters (32 bytes).

  JwtSecret:
    Type: String
    NoEcho: true
    Description: >
      64-character hex string for signing JWTs. Generate with:
      node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
    MinLength: 64
    MaxLength: 64
    AllowedPattern: '[0-9a-fA-F]{64}'
    ConstraintDescription: Must be exactly 64 hexadecimal characters.

  PostgresPassword:
    Type: String
    NoEcho: true
    Description: Database password for PostgreSQL (min 12 characters).
    MinLength: 12

  AllowedOrigins:
    Type: String
    Default: '*'
    Description: >
      CORS allowed origins for the API (comma-separated).
      Set to your frontend domain in production, e.g. https://myapp.com

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: >
      EC2 instance type. t3.micro is free-tier eligible but may be slow under
      load. t3.small is recommended for teams.

  KeyPairName:
    Type: String
    Default: ''
    Description: EC2 Key Pair name for SSH access (optional — leave blank to disable SSH).

  ApiPort:
    Type: Number
    Default: 3001
    MinValue: 1024
    MaxValue: 65535
    Description: Port the API will listen on (exposed to the internet).

# ─── Conditions ───────────────────────────────────────────────────────────────
Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

# ─── Resources ────────────────────────────────────────────────────────────────
Resources:

  # ── VPC Security Group ──────────────────────────────────────────────────────
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: envShare — allow API and optional SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApiPort
          ToPort: !Ref ApiPort
          CidrIp: 0.0.0.0/0
          Description: envShare API
        - !If
          - HasKeyPair
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: 0.0.0.0/0
            Description: SSH (restrict this to your IP in production)
          - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: envShare-sg
        - Key: Project
          Value: envShare

  # ── IAM Role — SSM Session Manager (no SSH key required) ───────────────────
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Project
          Value: envShare

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # ── EC2 Instance ────────────────────────────────────────────────────────────
  EC2Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M  # wait up to 15 min for cfn-signal
    Properties:
      InstanceType: !Ref InstanceType
      # Amazon Linux 2023 — latest stable x86_64 AMI (auto-resolves per region)
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      Tags:
        - Key: Name
          Value: envShare
        - Key: Project
          Value: envShare
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -eux

          # ── 1. System update & tools ─────────────────────────────────────────
          dnf update -y
          dnf install -y docker git aws-cfn-bootstrap

          systemctl enable --now docker
          usermod -aG docker ec2-user

          # ── 2. Docker Compose v2 ─────────────────────────────────────────────
          COMPOSE_VERSION=$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
            | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -fsSL \
            "https://github.com/docker/compose/releases/download/v${!COMPOSE_VERSION}/docker-compose-linux-x86_64" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          # ── 3. Clone envShare ────────────────────────────────────────────────
          cd /opt
          git clone https://github.com/s-pl/envShare.git
          cd envShare

          # ── 4. Write .env ────────────────────────────────────────────────────
          # NOTE: values are substituted by CloudFormation at stack creation.
          # The .env file is only readable by root on the instance.
          cat > .env <<ENVEOF
          POSTGRES_PASSWORD=${PostgresPassword}
          JWT_SECRET=${JwtSecret}
          MASTER_ENCRYPTION_KEY=${MasterEncryptionKey}
          ALLOWED_ORIGINS=${AllowedOrigins}
          PORT=3000
          NODE_ENV=production
          ENVEOF
          chmod 600 .env

          # ── 5. Override the exposed port ─────────────────────────────────────
          cat > docker-compose.override.yml <<OVERRIDEEOF
          services:
            backend:
              ports:
                - "${ApiPort}:3000"
          OVERRIDEEOF

          # ── 6. Start services ────────────────────────────────────────────────
          docker compose up -d

          # ── 7. Run migrations (wait for postgres to be healthy) ──────────────
          timeout 120 bash -c 'until docker compose exec -T postgres pg_isready -U envsharesai; do sleep 3; done'
          docker compose exec -T backend npx prisma migrate deploy

          # ── 8. Signal CloudFormation that setup is complete ──────────────────
          /opt/aws/bin/cfn-signal \
            --exit-code $? \
            --stack    ${AWS::StackName} \
            --resource EC2Instance \
            --region   ${AWS::Region}

# ─── Outputs ──────────────────────────────────────────────────────────────────
Outputs:

  ApiUrl:
    Description: envShare API URL — use this with `envshare url <ApiUrl>`
    Value: !Sub 'http://${EC2Instance.PublicDnsName}:${ApiPort}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  PublicIP:
    Description: Public IP address of the server
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-PublicIP'

  InstanceId:
    Description: EC2 Instance ID (for SSH / SSM access)
    Value: !Ref EC2Instance

  SshCommand:
    Description: >
      Connect via SSM Session Manager (no key pair needed — IAM role is attached).
      Install the Session Manager plugin: https://docs.aws.amazon.com/systems-manager/latest/userguide/session-manager-working-with-install-plugin.html
    Value: !Sub 'aws ssm start-session --target ${EC2Instance} --region ${AWS::Region}'

  NextSteps:
    Description: Run these commands on your local machine after the stack is created
    Value: !Sub |
      1. Point the CLI at your new server:
           envshare url http://${EC2Instance.PublicDnsName}:${ApiPort}
      2. Create your account:
           envshare register
           envshare login
      3. Create a project:
           envshare project create
